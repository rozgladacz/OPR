<div class="weapon-picker-tree-wrapper">
  <button
    class="weapon-picker-tree-trigger btn btn-outline-secondary d-flex justify-content-between align-items-center w-100"
    type="button"
    data-weapon-tree-trigger
    data-weapon-tree-placeholder="{{ weapon_tree_placeholder | default('Wybierz broń', true) }}"
    aria-haspopup="tree"
    aria-expanded="false"
  >
    <span class="weapon-picker-tree-trigger-label" data-weapon-tree-label>{{ weapon_tree_placeholder | default('Wybierz broń', true) }}</span>
    <span class="weapon-picker-tree-trigger-caret" aria-hidden="true">▾</span>
  </button>
  <div class="weapon-picker-tree-container d-none" data-weapon-tree-container>
    <div class="weapon-picker-tree border rounded p-2" data-weapon-tree></div>
  </div>
</div>
